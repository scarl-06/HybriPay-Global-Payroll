services:
  db:
    image: postgres:16-alpine
    container_name: payroll-db
    environment:
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: payroll123
      POSTGRES_DB: payroll_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: payroll-api
    ports:
      - "4000:3000"
    environment:
      - DATABASE_URL=postgresql://payroll:payroll123@db:5432/payroll_db?schema=public
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    container_name: payroll-dashboard
    ports:
      - "4001:8080"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    depends_on:
      - backend

volumes:
  postgres_data:
